<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/sections.css">
    <link rel="stylesheet" href="css/components.css">

    <link rel="stylesheet" href="css/login.css">
</head>

<body>

<section class="login">

    <div class="login__container">

        <div class="login__logo">
            <img src="image/logo-mobile.webp">
        </div>

        <div class="card login__card">

            <div class="Title">
                <h1 class="lg">Вход</h1>
            </div>

            <div class="card s">

                <!-- Телефон -->
                <div class="input-group">
                    <label class="xs">Телефон</label>
                    <input type="tel" id="phone" value="+7" maxlength="18">
                </div>

                <div class="line__horizontal"></div>

                <!-- Пароль -->
                <div class="input-group password-group">
                    <label class="xs">Пароль</label>

                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Введите пароль">
                        <span class="toggle-password" onclick="togglePassword()">👁️</span>
                    </div>
                </div>

                <div class="login__actions">

                    <button class="btn-dark" id="loginBtn">
                        Войти
                    </button>

                    <button class="btn-light">
                        Забыли пароль?
                    </button>

                    <button class="btn-light" onclick="openModal()">
                        Регистрация
                    </button>

                </div>

            </div>
        </div>
    </div>

    <!-- МОДАЛКА -->
    <div class="modal" id="modal">

        <div class="modal__content card">

            <div class="Title">
                <h1 class="lg">Регистрация</h1>
            </div>

            <div class="card s">

                <div class="input-group">
                    <input type="text" placeholder="Фамилия">
                </div>

                <div class="line__horizontal"></div>

                <div class="input-group">
                    <input type="text" placeholder="Имя">
                </div>

                <div class="line__horizontal"></div>

                <div class="input-group">
                    <input type="text" placeholder="Отчество">
                </div>

                <div class="line__horizontal"></div>

                <div class="input-group">
                    <input type="tel" id="regPhone" placeholder="+7 (___) ___-__-__">
                </div>

                <div class="login__actions">
                    <button class="btn-dark">Создать аккаунт</button>
                    <button class="btn-light" onclick="closeModal()">Отмена</button>
                </div>

            </div>

        </div>

    </div>

</section>
</body>
</html>
